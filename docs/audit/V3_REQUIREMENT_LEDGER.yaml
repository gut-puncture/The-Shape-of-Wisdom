requirements:
  - requirement_id: RQ-001
    claim_type: descriptive
    acceptance_criteria: Parser resolves A/B/C/D option-surface variants deterministically with first-token precedence.
    required_artifacts:
      - 00a_generate_baseline_outputs.report.json
    required_controls:
      - 00a_generate_baseline_outputs.report.json
    pass_conditions:
      all_of:
        - type: json_equals
          source: 00a_generate_baseline_outputs.report.json
          path: pass
          value: true
        - type: json_equals
          source: 00a_generate_baseline_outputs.report.json
          path: layer_index_contract
          value: transformer_only
        - type: json_equals
          source: 00a_generate_baseline_outputs.report.json
          path: gates.layer_index_contract_transformer_only
          value: true

  - requirement_id: RQ-002
    claim_type: descriptive
    acceptance_criteria: V2 correctness derives from final-layer top1 A/B/C/D logits.
    required_artifacts:
      - 02_compute_decision_metrics.report.json
      - decision_metrics.parquet
    required_controls:
      - 02_compute_decision_metrics.report.json
    pass_conditions:
      all_of:
        - type: json_equals
          source: 02_compute_decision_metrics.report.json
          path: pass
          value: true
        - type: json_equals
          source: 02_compute_decision_metrics.report.json
          path: correctness_source
          value: final_layer_top1_logits

  - requirement_id: RQ-003
    claim_type: descriptive
    acceptance_criteria: Stage03 trajectory typing covers all required classes with configured minimum counts.
    required_artifacts:
      - 03_classify_trajectories.report.json
      - prompt_types.parquet
    required_controls:
      - 03_classify_trajectories.report.json
    pass_conditions:
      all_of:
        - type: json_equals
          source: 03_classify_trajectories.report.json
          path: pass
          value: true

  - requirement_id: RQ-004
    claim_type: descriptive
    acceptance_criteria: Stage05 paraphrase stability and sampling contracts are enforced fail-closed.
    required_artifacts:
      - 05_span_counterfactuals.report.json
      - span_paraphrase_stability.parquet
      - spans.jsonl
    required_controls:
      - 05_span_counterfactuals.report.json
    pass_conditions:
      all_of:
        - type: json_equals
          source: 05_span_counterfactuals.report.json
          path: pass
          value: true

  - requirement_id: RQ-005
    claim_type: descriptive
    acceptance_criteria: Stage06 tracing subset enforces trajectory quotas and difficult-domain balancing.
    required_artifacts:
      - 06_select_tracing_subset.report.json
    required_controls:
      - 06_select_tracing_subset.report.json
    pass_conditions:
      all_of:
        - type: json_equals
          source: 06_select_tracing_subset.report.json
          path: pass
          value: true

  - requirement_id: RQ-006
    claim_type: mechanistic
    acceptance_criteria: Stage08 decomposition satisfies train/test split and fit quality gates.
    required_artifacts:
      - 08_attention_and_mlp_decomposition.report.json
      - attention_mass_by_span.parquet
      - attention_contrib_by_span.parquet
    required_controls:
      - 08_attention_and_mlp_decomposition.report.json
    pass_conditions:
      all_of:
        - type: json_equals
          source: 08_attention_and_mlp_decomposition.report.json
          path: pass
          value: true

  - requirement_id: RQ-007
    claim_type: causal
    acceptance_criteria: Stage09 causal tests satisfy minimum evidence and component coverage gates.
    required_artifacts:
      - 09_causal_tests.report.json
      - ablation_results.parquet
      - patching_results.parquet
    required_controls:
      - 09_causal_tests.report.json
    pass_conditions:
      all_of:
        - type: json_equals
          source: 09_causal_tests.report.json
          path: pass
          value: true

  - requirement_id: RQ-008
    claim_type: causal
    acceptance_criteria: Stage10 statistical validation passes multiple-comparison and control-strength gates.
    required_artifacts:
      - 10_causal_validation_tools.report.json
      - span_deletion_causal.parquet
      - negative_controls.parquet
    required_controls:
      - 10_causal_validation_tools.report.json
    pass_conditions:
      all_of:
        - type: json_equals
          source: 10_causal_validation_tools.report.json
          path: pass
          value: true

  - requirement_id: RQ-009
    claim_type: mechanistic
    acceptance_criteria: Version-floor and model nuance constraints are enforced for traced models.
    required_artifacts:
      - 05_span_counterfactuals.report.json
      - 07_run_tracing.report.json
    required_controls:
      - 05_span_counterfactuals.report.json
      - 07_run_tracing.report.json
    pass_conditions:
      all_of:
        - type: json_equals
          source: 05_span_counterfactuals.report.json
          path: pass
          value: true
        - type: json_equals
          source: 07_run_tracing.report.json
          path: pass
          value: true

  - requirement_id: RQ-010
    claim_type: descriptive
    acceptance_criteria: Thermal resume/checkpoint semantics are deterministic and idempotent.
    required_artifacts:
      - 00a_generate_baseline_outputs.report.json
      - 05_span_counterfactuals.report.json
      - 07_run_tracing.report.json
    required_controls:
      - 00a_generate_baseline_outputs.report.json
      - 05_span_counterfactuals.report.json
      - 07_run_tracing.report.json
    pass_conditions:
      all_of:
        - type: json_equals
          source: 00a_generate_baseline_outputs.report.json
          path: pass
          value: true
        - type: json_equals
          source: 05_span_counterfactuals.report.json
          path: pass
          value: true
        - type: json_equals
          source: 07_run_tracing.report.json
          path: pass
          value: true

  - requirement_id: RQ-011
    claim_type: descriptive
    acceptance_criteria: Bundle contract includes all required stage outputs and metadata snapshot.
    required_artifacts:
      - 00_run_experiment.report.json
      - meta/run_start_metadata_snapshot.json
    required_controls:
      - 00_run_experiment.report.json
    pass_conditions:
      all_of:
        - type: json_equals
          source: 00_run_experiment.report.json
          path: pass
          value: true
        - type: json_len_gte
          source: 00_run_experiment.report.json
          path: run_start_metadata_snapshot
          value: 1

  - requirement_id: RQ-012
    claim_type: descriptive
    acceptance_criteria: Fresh baseline regeneration is runnable in-repo for all selected models.
    required_artifacts:
      - 00a_generate_baseline_outputs.report.json
      - ../manifests/ccc_baseline.jsonl
    required_controls:
      - 00a_generate_baseline_outputs.report.json
    pass_conditions:
      all_of:
        - type: json_equals
          source: 00a_generate_baseline_outputs.report.json
          path: pass
          value: true
        - type: json_gte
          source: 00a_generate_baseline_outputs.report.json
          path: manifest.rows
          value: 1

  - requirement_id: RQ-013
    claim_type: descriptive
    acceptance_criteria: Orchestrator must not claim readiness when gated stages fail or are dependency-skipped.
    required_artifacts:
      - 00_run_experiment.report.json
    required_controls:
      - 00_run_experiment.report.json
    pass_conditions:
      all_of:
        - type: json_equals
          source: 00_run_experiment.report.json
          path: pass
          value: true
        - type: json_equals
          source: 00_run_experiment.report.json
          path: ready_to_execute_full_experiment
          value: true

  - requirement_id: RQ-014
    claim_type: descriptive
    acceptance_criteria: Readiness audit must produce deterministic GO/NO-GO with failing requirement IDs.
    required_artifacts:
      - meta/readiness_audit.json
    required_controls:
      - meta/readiness_audit.json
    pass_conditions:
      all_of:
        - type: self_contract
        - type: json_equals
          source: meta/readiness_audit.json
          path: verdict
          value: GO
        - type: json_len_eq
          source: meta/readiness_audit.json
          path: failing_requirements
          value: 0
